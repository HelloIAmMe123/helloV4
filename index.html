<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Classroom</title>
    <link rel="icon" type="image/x-icon" href="https://gstatic.com">
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; }
        h1 { font-weight: 300; color: #aaa; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #444; background: #333; color: white; transition: 0.2s; }
        button:hover { background: #444; border-color: #666; }
    </style>
</head>
<body>

<div class="container" id="main">
    <h1>Module Loading...</h1>
    <button onclick="launch()">Open Assignment</button>
</div>

<script>
function launch() {

    const target = "https://wingdemon.net";

    const win = window.open('about:blank', '_blank');

    win.document.body.style.margin = "0";
    win.document.body.style.height = "100vh";
    win.document.title = "Assignment Details"; 

    const link = win.document.createElement('link');
    link.rel = 'icon';
    link.href = 'https://gstatic.com';
    win.document.head.appendChild(link);

    const iframe = win.document.createElement('iframe');
    iframe.src = target;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.allowFullscreen = true;
    win.document.body.appendChild(iframe);

    win.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === "q") { win.close(); }
    });

    window.location.replace("https://google.com");
}
</script>
</body>
</html>
